name: CI Sanitizer

on:
  workflow_dispatch:
    inputs:
      sanitizer:
        description: Sanitizer to run.
        required: true
        default: asan
        type: choice
        options:
          - asan
          - tsan

permissions:
  contents: read

jobs:
  sanitizer:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Build local CI image
        run: docker build -t photospider-ci:local -f Dockerfile.ci .

      - name: Run sanitizer tests
        run: |
          docker run --rm \
            -e SANITIZER="${{ inputs.sanitizer }}" \
            -e CI_ARTIFACT_DIR="/workspace/CI-results/sanitizer-${{ inputs.sanitizer }}" \
            -v "$PWD:/workspace" \
            -w /workspace \
            photospider-ci:local \
            bash ci/scripts/sanitizer_test.sh

      - name: Upload sanitizer logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sanitizer-${{ inputs.sanitizer }}-results
          path: CI-results/sanitizer-${{ inputs.sanitizer }}
          if-no-files-found: warn
