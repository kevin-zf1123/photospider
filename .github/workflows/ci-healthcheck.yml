name: CI Healthcheck

on:
  pull_request:
  push:
    branches:
      - main
      - CI/workflow-design
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  healthcheck:
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository }}/photospider-ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Run healthcheck
        env:
          CI_BASE_REF: origin/${{ github.base_ref || 'main' }}
          CI_ARTIFACT_DIR: ${{ github.workspace }}/CI-results/healthcheck
        run: bash ci/scripts/healthcheck.sh

      - name: Upload healthcheck logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: healthcheck-results
          path: CI-results/healthcheck
          if-no-files-found: warn
