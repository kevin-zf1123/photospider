name: CI Integration

on:
  pull_request_target:
    branches:
      - main
  push:
    branches:
      - main
      - 'CI/**'
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  protected-ci-paths:
    if: >-
      ${{
        github.event_name != 'pull_request_target' ||
        !startsWith(github.head_ref, 'CI/') ||
        github.event.pull_request.head.repo.full_name != github.repository
      }}
    runs-on: ubuntu-latest
    steps:
      - name: Reject fork CI branch pull request
        if: >-
          ${{
            github.event_name == 'pull_request_target' &&
            startsWith(github.head_ref, 'CI/') &&
            github.event.pull_request.head.repo.full_name != github.repository
          }}
        env:
          CI_ARTIFACT_DIR: ${{ github.workspace }}/CI-results/protected-ci-paths
          CI_BASE_REPOSITORY: ${{ github.repository }}
          CI_HEAD_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name || '' }}
        run: |
          set -Eeuo pipefail
          mkdir -p "$CI_ARTIFACT_DIR"
          {
            echo "Fork CI/** pull requests are rejected before checkout."
            echo "Only CI/** branches in '$CI_BASE_REPOSITORY' are covered by the push-triggered workflow."
            echo "Received head repository: '${CI_HEAD_REPOSITORY:-unavailable}'."
          } | tee "$CI_ARTIFACT_DIR/summary.log" >&2
          exit 1

      - uses: actions/checkout@v4
        with:
          repository: ${{ (github.event_name == 'pull_request' || github.event_name == 'pull_request_target') && github.event.pull_request.head.repo.full_name || github.repository }}
          fetch-depth: 0
          ref: ${{ (github.event_name == 'pull_request' || github.event_name == 'pull_request_target') && github.event.pull_request.head.sha || github.sha }}

      - name: Protect CI workflow paths
        env:
          CI_BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
          CI_EVENT_NAME: ${{ github.event_name }}
          CI_BASE_REPOSITORY: ${{ github.repository }}
          CI_HEAD_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name || '' }}
          CI_HEAD_IS_BASE_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name != '' && github.event.pull_request.head.repo.full_name == github.repository }}
          CI_BASE_BRANCH: ${{ github.base_ref }}
          CI_BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
          CI_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          CI_ARTIFACT_DIR: ${{ github.workspace }}/CI-results/protected-ci-paths
        run: |
          set -Eeuo pipefail
          mkdir -p "$CI_ARTIFACT_DIR"
          : > "$CI_ARTIFACT_DIR/changed-files.z"
          : > "$CI_ARTIFACT_DIR/changed-files.txt"
          : > "$CI_ARTIFACT_DIR/protected-files.txt"

          if [[ "$CI_EVENT_NAME" == "push" && "$CI_BRANCH_NAME" == "main" ]]; then
            echo "main branch push may update CI workflow files." |
              tee "$CI_ARTIFACT_DIR/summary.log"
            exit 0
          fi
          if [[ "$CI_BRANCH_NAME" == CI/* &&
            (
              "$CI_EVENT_NAME" == push ||
              "$CI_EVENT_NAME" == workflow_dispatch ||
              (
                "$CI_EVENT_NAME" == pull_request_target &&
                -n "$CI_HEAD_REPOSITORY" &&
                "$CI_HEAD_IS_BASE_REPOSITORY" == true
              )
            ) ]]; then
            echo "CI branch '$CI_BRANCH_NAME' may update CI workflow files." |
              tee "$CI_ARTIFACT_DIR/summary.log"
            exit 0
          fi

          diff_candidate_base=origin/main
          diff_head=HEAD
          if [[ "$CI_EVENT_NAME" == pull_request ||
            "$CI_EVENT_NAME" == pull_request_target ]]; then
            git fetch --no-tags --no-recurse-submodules \
              "https://github.com/${CI_BASE_REPOSITORY}.git" \
              "+refs/heads/${CI_BASE_BRANCH}:refs/remotes/photospider-base/${CI_BASE_BRANCH}"
            diff_candidate_base=$CI_BASE_SHA
            diff_head=$CI_HEAD_SHA
          else
            git fetch --no-tags --prune origin main
          fi

          git rev-parse --verify "$diff_candidate_base^{commit}" >/dev/null
          git rev-parse --verify "$diff_head^{commit}" >/dev/null
          if ! git merge-base --all "$diff_candidate_base" "$diff_head" \
            > "$CI_ARTIFACT_DIR/merge-bases.txt"; then
            echo "Protected-path merge-base detection failed." >&2
            exit 1
          fi
          mapfile -t merge_bases < "$CI_ARTIFACT_DIR/merge-bases.txt"
          if ((${#merge_bases[@]} != 1)); then
            echo "Protected-path comparison requires exactly one merge base." >&2
            exit 1
          fi
          diff_base=${merge_bases[0]}

          if ! git diff --no-renames --name-only -z \
            "$diff_base" "$diff_head" \
            > "$CI_ARTIFACT_DIR/changed-files.z"; then
            echo "Protected-path changed-path detection failed." >&2
            exit 1
          fi
          changed_files=()
          if ! mapfile -d '' -t changed_files \
            < "$CI_ARTIFACT_DIR/changed-files.z"; then
            echo "Protected-path changed-path inventory read failed." >&2
            exit 1
          fi
          for changed_file in "${changed_files[@]}"; do
            printf '%q\n' "$changed_file" \
              >> "$CI_ARTIFACT_DIR/changed-files.txt"
            case "$changed_file" in
              Dockerfile.ci | ci/* | .github/workflows/*)
                printf '%q\n' "$changed_file" \
                  >> "$CI_ARTIFACT_DIR/protected-files.txt"
                ;;
            esac
          done

          if [[ -s "$CI_ARTIFACT_DIR/protected-files.txt" ]]; then
            {
              echo "Only trusted base-repository CI/** runs may change ci/, .github/workflows/, or Dockerfile.ci."
              echo "Develop CI workflow changes on a CI/** branch in '$CI_BASE_REPOSITORY'."
            } | tee "$CI_ARTIFACT_DIR/summary.log" >&2
            exit 1
          fi

          echo "No protected CI workflow paths changed on '$CI_BRANCH_NAME'." |
            tee "$CI_ARTIFACT_DIR/summary.log"

      - name: Upload protected path logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-protected-ci-paths
          path: CI-results/protected-ci-paths
          if-no-files-found: warn

  change-classification:
    needs: protected-ci-paths
    if: needs.protected-ci-paths.result == 'success'
    runs-on: ubuntu-latest
    outputs:
      docs_only: ${{ steps.classify.outputs.docs_only }}
      run_integration: ${{ steps.classify.outputs.run_integration }}
      reason: ${{ steps.classify.outputs.reason }}
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ (github.event_name == 'pull_request' || github.event_name == 'pull_request_target') && github.event.pull_request.head.repo.full_name || github.repository }}
          fetch-depth: 0
          ref: ${{ (github.event_name == 'pull_request' || github.event_name == 'pull_request_target') && github.event.pull_request.head.sha || github.sha }}
      - name: Fetch pull request base history
        if: github.event_name == 'pull_request' || github.event_name == 'pull_request_target'
        env:
          CI_BASE_REPOSITORY: ${{ github.repository }}
          CI_BASE_BRANCH: ${{ github.base_ref }}
        run: |
          set -Eeuo pipefail
          if ! git fetch --no-tags --no-recurse-submodules \
            "https://github.com/${CI_BASE_REPOSITORY}.git" \
            "+refs/heads/${CI_BASE_BRANCH}:refs/remotes/photospider-base/${CI_BASE_BRANCH}"; then
            echo "Base history fetch failed; classification will require full integration." |
              tee -a "$GITHUB_STEP_SUMMARY"
          fi
      - name: Classify changed paths
        id: classify
        env:
          CI_CHANGE_EVENT: ${{ github.event_name }}
          CI_CHANGE_BRANCH: ${{ github.ref_name }}
          CI_CHANGE_BASE_SHA: ${{ (github.event_name == 'pull_request' || github.event_name == 'pull_request_target') && github.event.pull_request.base.sha || github.event.before }}
          CI_CHANGE_HEAD_SHA: ${{ (github.event_name == 'pull_request' || github.event_name == 'pull_request_target') && github.event.pull_request.head.sha || github.event_name == 'push' && github.event.after || github.sha }}
          CI_ARTIFACT_DIR: ${{ github.workspace }}/CI-results/change-classification
        run: bash ci/scripts/change_classification.sh
      - name: Upload change classification logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-change-classification
          path: CI-results/change-classification
          if-no-files-found: warn

  ci-image-change:
    needs: change-classification
    if: >-
      ${{
        needs.change-classification.result == 'success' &&
        needs.change-classification.outputs.run_integration == 'true'
      }}
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.detect.outputs.changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ (github.event_name == 'pull_request' || github.event_name == 'pull_request_target') && github.event.pull_request.head.repo.full_name || github.repository }}
          fetch-depth: 0
          submodules: recursive
          ref: ${{ (github.event_name == 'pull_request' || github.event_name == 'pull_request_target') && github.event.pull_request.head.sha || github.sha }}
      - name: Fetch pull request base history
        if: github.event_name == 'pull_request' || github.event_name == 'pull_request_target'
        env:
          CI_BASE_REPOSITORY: ${{ github.repository }}
          CI_BASE_BRANCH: ${{ github.base_ref }}
          CI_BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -Eeuo pipefail
          git fetch --no-tags --no-recurse-submodules \
            "https://github.com/${CI_BASE_REPOSITORY}.git" \
            "+refs/heads/${CI_BASE_BRANCH}:refs/remotes/photospider-base/${CI_BASE_BRANCH}"
          git rev-parse --verify "$CI_BASE_SHA^{commit}" >/dev/null
      - name: Fetch CI branch main history
        if: github.event_name == 'push' && startsWith(github.ref_name, 'CI/')
        run: |
          set -Eeuo pipefail
          git fetch --no-tags --prune origin main
      - name: Detect CI image input changes
        id: detect
        env:
          CI_IMAGE_BASE_REF: ${{ (github.event_name == 'pull_request' || github.event_name == 'pull_request_target') && github.event.pull_request.base.sha || (github.event_name == 'push' && startsWith(github.ref_name, 'CI/')) && 'origin/main' || github.event.before }}
          CI_ARTIFACT_DIR: ${{ github.workspace }}/CI-results/ci-image-change
        run: bash ci/scripts/ci_image_changed.sh
      - name: Upload CI image change logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-ci-image-change
          path: CI-results/ci-image-change
          if-no-files-found: warn

  integration-plan:
    needs: [change-classification, ci-image-change]
    if: >-
      ${{
        needs.change-classification.outputs.run_integration == 'true' &&
        needs.ci-image-change.outputs.changed != 'true'
      }}
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository }}/photospider-ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ (github.event_name == 'pull_request' || github.event_name == 'pull_request_target') && github.event.pull_request.head.repo.full_name || github.repository }}
          fetch-depth: 0
          submodules: recursive
          ref: ${{ (github.event_name == 'pull_request' || github.event_name == 'pull_request_target') && github.event.pull_request.head.sha || github.sha }}
      - name: Preflight integration inventory
        env:
          CI_ARTIFACT_DIR: ${{ github.workspace }}/CI-results/integration-plan
        run: bash ci/scripts/integration_plan.sh
      - name: Upload integration plan logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-plan-results
          path: CI-results/integration-plan
          if-no-files-found: warn

  build-integrity-default:
    needs: integration-plan
    if: needs.integration-plan.result == 'success'
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository }}/photospider-ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    outputs:
      build_smoke_matrix: ${{ steps.build.outputs.build_smoke_matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ (github.event_name == 'pull_request' || github.event_name == 'pull_request_target') && github.event.pull_request.head.repo.full_name || github.repository }}
          fetch-depth: 0
          submodules: recursive
          ref: ${{ (github.event_name == 'pull_request' || github.event_name == 'pull_request_target') && github.event.pull_request.head.sha || github.sha }}
      - name: Run build integrity
        id: build
        env:
          CI_ARTIFACT_DIR: ${{ github.workspace }}/CI-results/build-integrity-default
          CI_BUILD_PROFILE: default
        run: bash ci/scripts/build_integrity.sh
      - name: Pack reusable build
        run: |
          mkdir -p CI-results/reusable-build-default
          tar -C build -czf CI-results/reusable-build-default/ci-build.tar.gz ci
      - name: Upload build integrity logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-integrity-default-results
          path: CI-results/build-integrity-default
          if-no-files-found: warn
      - name: Upload reusable build
        uses: actions/upload-artifact@v4
        with:
          name: ci-build-default
          path: CI-results/reusable-build-default/ci-build.tar.gz
          if-no-files-found: error
          retention-days: 3
          compression-level: 0

  local-image-integration:
    needs: [change-classification, ci-image-change]
    if: >-
      ${{
        needs.change-classification.outputs.run_integration == 'true' &&
        needs.ci-image-change.outputs.changed == 'true'
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ (github.event_name == 'pull_request' || github.event_name == 'pull_request_target') && github.event.pull_request.head.repo.full_name || github.repository }}
          fetch-depth: 0
          submodules: recursive
          ref: ${{ (github.event_name == 'pull_request' || github.event_name == 'pull_request_target') && github.event.pull_request.head.sha || github.sha }}

      - name: Build local CI image
        run: docker build -t photospider-ci:local -f Dockerfile.ci .

      - name: Run integration suite in local CI image
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            -e CI_ARTIFACT_ROOT=/workspace/CI-results \
            -e SCHEDULER_REPEAT=5 \
            -e GPU_PIPELINE_REPEAT=3 \
            photospider-ci:local \
            bash ci/scripts/integration_suite.sh

      - name: Upload local image integration logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-local-image-results
          path: CI-results
          if-no-files-found: warn

  full-ctest:
    needs: [integration-plan, build-integrity-default]
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository }}/photospider-ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ (github.event_name == 'pull_request' || github.event_name == 'pull_request_target') && github.event.pull_request.head.repo.full_name || github.repository }}
          fetch-depth: 0
          submodules: recursive
          ref: ${{ (github.event_name == 'pull_request' || github.event_name == 'pull_request_target') && github.event.pull_request.head.sha || github.sha }}
      - name: Download reusable build
        uses: actions/download-artifact@v4
        with:
          name: ci-build-default
          path: CI-results/reusable-build
      - name: Restore reusable build
        run: |
          rm -rf build/ci
          mkdir -p build
          tar -C build -xzf CI-results/reusable-build/ci-build.tar.gz
      - name: Run full ctest
        env:
          CI_ARTIFACT_DIR: ${{ github.workspace }}/CI-results/ctest-full
          CI_REUSE_BUILD: ON
        run: bash ci/scripts/ctest_full.sh
      - name: Upload ctest logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ctest-full-results
          path: CI-results/ctest-full
          if-no-files-found: warn

  build-smoke:
    name: Build smoke (${{ matrix.test }})
    needs: [integration-plan, build-integrity-default]
    if: >-
      needs.integration-plan.result == 'success' &&
      needs.build-integrity-default.result == 'success'
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.build-integrity-default.outputs.build_smoke_matrix || '{"include":[]}') }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    container:
      image: ghcr.io/${{ github.repository }}/photospider-ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ (github.event_name == 'pull_request' || github.event_name == 'pull_request_target') && github.event.pull_request.head.repo.full_name || github.repository }}
          fetch-depth: 0
          submodules: recursive
          ref: ${{ (github.event_name == 'pull_request' || github.event_name == 'pull_request_target') && github.event.pull_request.head.sha || github.sha }}
      - name: Download reusable build
        uses: actions/download-artifact@v4
        with:
          name: ci-build-default
          path: CI-results/reusable-build
      - name: Restore reusable build
        run: |
          rm -rf build/ci
          mkdir -p build
          tar -C build -xzf CI-results/reusable-build/ci-build.tar.gz
      - name: Run labelled build smoke
        env:
          CI_ARTIFACT_DIR: ${{ github.workspace }}/CI-results/build-smoke/${{ matrix.artifact }}
          CI_BUILD_PROFILE: default
          CI_REUSE_BUILD: ON
          SMOKE_TEST_NAME: ${{ matrix.test }}
        run: bash ci/scripts/build_smoke_test.sh
      - name: Upload build smoke logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-smoke-${{ matrix.artifact }}-results
          path: CI-results/build-smoke/${{ matrix.artifact }}
          if-no-files-found: warn

  scripted-cli:
    needs: [integration-plan, build-integrity-default]
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository }}/photospider-ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ (github.event_name == 'pull_request' || github.event_name == 'pull_request_target') && github.event.pull_request.head.repo.full_name || github.repository }}
          fetch-depth: 0
          submodules: recursive
          ref: ${{ (github.event_name == 'pull_request' || github.event_name == 'pull_request_target') && github.event.pull_request.head.sha || github.sha }}
      - name: Download reusable build
        uses: actions/download-artifact@v4
        with:
          name: ci-build-default
          path: CI-results/reusable-build
      - name: Restore reusable build
        run: |
          rm -rf build/ci
          mkdir -p build
          tar -C build -xzf CI-results/reusable-build/ci-build.tar.gz
      - name: Run graph_cli script test
        env:
          CI_ARTIFACT_DIR: ${{ github.workspace }}/CI-results/graph-cli
          CI_REUSE_BUILD: ON
        run: bash ci/scripts/graph_cli_script_test.sh
      - name: Upload graph_cli logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: graph-cli-results
          path: CI-results/graph-cli
          if-no-files-found: warn

  propagation-script:
    needs: [integration-plan, build-integrity-default]
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository }}/photospider-ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ (github.event_name == 'pull_request' || github.event_name == 'pull_request_target') && github.event.pull_request.head.repo.full_name || github.repository }}
          fetch-depth: 0
          submodules: recursive
          ref: ${{ (github.event_name == 'pull_request' || github.event_name == 'pull_request_target') && github.event.pull_request.head.sha || github.sha }}
      - name: Download reusable build
        uses: actions/download-artifact@v4
        with:
          name: ci-build-default
          path: CI-results/reusable-build
      - name: Restore reusable build
        run: |
          rm -rf build/ci
          mkdir -p build
          tar -C build -xzf CI-results/reusable-build/ci-build.tar.gz
      - name: Run propagation script test
        env:
          CI_ARTIFACT_DIR: ${{ github.workspace }}/CI-results/propagation
          CI_REUSE_BUILD: ON
        run: bash ci/scripts/propagation_script_test.sh
      - name: Upload propagation logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: propagation-results
          path: CI-results/propagation
          if-no-files-found: warn

  plugin-load:
    needs: [integration-plan, build-integrity-default]
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository }}/photospider-ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ (github.event_name == 'pull_request' || github.event_name == 'pull_request_target') && github.event.pull_request.head.repo.full_name || github.repository }}
          fetch-depth: 0
          submodules: recursive
          ref: ${{ (github.event_name == 'pull_request' || github.event_name == 'pull_request_target') && github.event.pull_request.head.sha || github.sha }}
      - name: Download reusable build
        uses: actions/download-artifact@v4
        with:
          name: ci-build-default
          path: CI-results/reusable-build
      - name: Restore reusable build
        run: |
          rm -rf build/ci
          mkdir -p build
          tar -C build -xzf CI-results/reusable-build/ci-build.tar.gz
      - name: Run plugin load test
        env:
          CI_ARTIFACT_DIR: ${{ github.workspace }}/CI-results/plugin-load
          CI_REUSE_BUILD: ON
        run: bash ci/scripts/plugin_load_test.sh
      - name: Upload plugin logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: plugin-load-results
          path: CI-results/plugin-load
          if-no-files-found: warn

  scheduler-repeat:
    needs: [integration-plan, build-integrity-default]
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/${{ github.repository }}/photospider-ci:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ (github.event_name == 'pull_request' || github.event_name == 'pull_request_target') && github.event.pull_request.head.repo.full_name || github.repository }}
          fetch-depth: 0
          submodules: recursive
          ref: ${{ (github.event_name == 'pull_request' || github.event_name == 'pull_request_target') && github.event.pull_request.head.sha || github.sha }}
      - name: Download reusable build
        uses: actions/download-artifact@v4
        with:
          name: ci-build-default
          path: CI-results/reusable-build
      - name: Restore reusable build
        run: |
          rm -rf build/ci
          mkdir -p build
          tar -C build -xzf CI-results/reusable-build/ci-build.tar.gz
      - name: Run scheduler repeat test
        env:
          CI_ARTIFACT_DIR: ${{ github.workspace }}/CI-results/scheduler-repeat
          CI_REUSE_BUILD: ON
          SCHEDULER_REPEAT: 5
          GPU_PIPELINE_REPEAT: 3
        run: bash ci/scripts/scheduler_repeat_test.sh
      - name: Upload scheduler repeat logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scheduler-repeat-results
          path: CI-results/scheduler-repeat
          if-no-files-found: warn

  integration:
    needs:
      - protected-ci-paths
      - change-classification
      - ci-image-change
      - integration-plan
      - build-integrity-default
      - local-image-integration
      - full-ctest
      - build-smoke
      - scripted-cli
      - propagation-script
      - plugin-load
      - scheduler-repeat
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Report integration gate
        env:
          CI_BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
          CI_EVENT_NAME: ${{ github.event_name }}
          CI_BASE_REPOSITORY: ${{ github.repository }}
          CI_HEAD_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name || '' }}
          CI_HEAD_IS_BASE_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name != '' && github.event.pull_request.head.repo.full_name == github.repository }}
          PROTECTED_RESULT: ${{ needs.protected-ci-paths.result }}
          CLASSIFICATION_RESULT: ${{ needs.change-classification.result }}
          DOCS_ONLY: ${{ needs.change-classification.outputs.docs_only }}
          RUN_INTEGRATION: ${{ needs.change-classification.outputs.run_integration }}
          CLASSIFICATION_REASON: ${{ needs.change-classification.outputs.reason }}
          IMAGE_CHANGE_RESULT: ${{ needs.ci-image-change.result }}
          IMAGE_CHANGED: ${{ needs.ci-image-change.outputs.changed }}
          PLAN_RESULT: ${{ needs.integration-plan.result }}
          BUILD_DEFAULT_RESULT: ${{ needs.build-integrity-default.result }}
          LOCAL_IMAGE_RESULT: ${{ needs.local-image-integration.result }}
          FULL_CTEST_RESULT: ${{ needs.full-ctest.result }}
          BUILD_SMOKE_RESULT: ${{ needs.build-smoke.result }}
          SCRIPTED_CLI_RESULT: ${{ needs.scripted-cli.result }}
          PROPAGATION_RESULT: ${{ needs.propagation-script.result }}
          PLUGIN_LOAD_RESULT: ${{ needs.plugin-load.result }}
          SCHEDULER_REPEAT_RESULT: ${{ needs.scheduler-repeat.result }}
        run: |
          set -Eeuo pipefail

          # @brief Require one named assertion value to match exactly.
          # @param $1 Stable assertion label used only for diagnostics.
          # @param $2 Actual value being asserted.
          # @param $3 Expected value.
          # @return Zero for an exact match, otherwise one with a diagnostic.
          # @throws Nothing; mismatches return nonzero to the gate.
          # @note Labels may identify job conclusions or routed output values.
          require_value() {
            local assertion_label=$1
            local actual=$2
            local expected=$3
            if [[ "$actual" != "$expected" ]]; then
              echo "$assertion_label was '$actual'; expected '$expected'." >&2
              return 1
            fi
          }

          # @brief Require every normal integration shard to be intentionally skipped.
          # @return Zero only when all build, CTest, and integration jobs are skipped.
          # @throws Nothing; mismatches return nonzero through require_value.
          # @note Used for documentation-only and local-image routing assertions.
          require_normal_shards_skipped() {
            require_value integration-plan "$PLAN_RESULT" skipped
            require_value build-integrity-default "$BUILD_DEFAULT_RESULT" skipped
            require_value full-ctest "$FULL_CTEST_RESULT" skipped
            require_value build-smoke "$BUILD_SMOKE_RESULT" skipped
            require_value scripted-cli "$SCRIPTED_CLI_RESULT" skipped
            require_value propagation-script "$PROPAGATION_RESULT" skipped
            require_value plugin-load "$PLUGIN_LOAD_RESULT" skipped
            require_value scheduler-repeat "$SCHEDULER_REPEAT_RESULT" skipped
          }

          if [[ "$CI_EVENT_NAME" == pull_request_target &&
            "$CI_BRANCH_NAME" == CI/* &&
            -n "$CI_HEAD_REPOSITORY" &&
            "$CI_HEAD_IS_BASE_REPOSITORY" == true ]]; then
            echo "Same-repository CI/** pull request intentionally uses the push-triggered workflow." |
              tee -a "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          require_value protected-ci-paths "$PROTECTED_RESULT" success
          require_value change-classification "$CLASSIFICATION_RESULT" success

          if [[ "$DOCS_ONLY" == true ]]; then
            require_value RUN_INTEGRATION "$RUN_INTEGRATION" false
            require_value ci-image-change "$IMAGE_CHANGE_RESULT" skipped
            require_normal_shards_skipped
            require_value local-image-integration "$LOCAL_IMAGE_RESULT" skipped
            {
              echo "Documentation-only change detected ($CLASSIFICATION_REASON)."
              echo "Compilation, CTest, and integration shards were intentionally skipped; healthcheck remains required."
            } | tee -a "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          require_value DOCS_ONLY "$DOCS_ONLY" false
          require_value RUN_INTEGRATION "$RUN_INTEGRATION" true
          require_value ci-image-change "$IMAGE_CHANGE_RESULT" success
          case "$IMAGE_CHANGED" in
            true)
              require_normal_shards_skipped
              require_value local-image-integration "$LOCAL_IMAGE_RESULT" success
              echo "Full integration passed in the locally built CI image." |
                tee -a "$GITHUB_STEP_SUMMARY"
              ;;
            false)
              require_value local-image-integration "$LOCAL_IMAGE_RESULT" skipped
              require_value integration-plan "$PLAN_RESULT" success
              require_value build-integrity-default \
                "$BUILD_DEFAULT_RESULT" success
              require_value full-ctest "$FULL_CTEST_RESULT" success
              require_value build-smoke "$BUILD_SMOKE_RESULT" success
              require_value scripted-cli "$SCRIPTED_CLI_RESULT" success
              require_value propagation-script "$PROPAGATION_RESULT" success
              require_value plugin-load "$PLUGIN_LOAD_RESULT" success
              require_value scheduler-repeat "$SCHEDULER_REPEAT_RESULT" success

              echo "Full published-image integration matrix passed." |
                tee -a "$GITHUB_STEP_SUMMARY"
              ;;
            *)
              echo "CI image classification produced '$IMAGE_CHANGED'." >&2
              exit 1
              ;;
          esac
