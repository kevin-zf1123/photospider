name: CI Integration

on:
  pull_request:
  push:
    branches:
      - main
      - CI/workflow-design
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-integrity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
      - name: Build local CI image
        run: docker build -t photospider-ci:local -f Dockerfile.ci .
      - name: Run build integrity
        run: |
          docker run --rm \
            -e CI_ARTIFACT_DIR=/workspace/CI-results/build-integrity \
            -v "$PWD:/workspace" \
            -w /workspace \
            photospider-ci:local \
            bash ci/scripts/build_integrity.sh
      - name: Upload build integrity logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-integrity-results
          path: CI-results/build-integrity
          if-no-files-found: warn

  full-ctest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
      - name: Build local CI image
        run: docker build -t photospider-ci:local -f Dockerfile.ci .
      - name: Run full ctest
        run: |
          docker run --rm \
            -e CI_ARTIFACT_DIR=/workspace/CI-results/ctest-full \
            -v "$PWD:/workspace" \
            -w /workspace \
            photospider-ci:local \
            bash ci/scripts/ctest_full.sh
      - name: Upload ctest logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ctest-full-results
          path: CI-results/ctest-full
          if-no-files-found: warn

  scripted-cli:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
      - name: Build local CI image
        run: docker build -t photospider-ci:local -f Dockerfile.ci .
      - name: Run graph_cli script test
        run: |
          docker run --rm \
            -e CI_ARTIFACT_DIR=/workspace/CI-results/graph-cli \
            -v "$PWD:/workspace" \
            -w /workspace \
            photospider-ci:local \
            bash ci/scripts/graph_cli_script_test.sh
      - name: Upload graph_cli logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: graph-cli-results
          path: CI-results/graph-cli
          if-no-files-found: warn

  propagation-script:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
      - name: Build local CI image
        run: docker build -t photospider-ci:local -f Dockerfile.ci .
      - name: Run propagation script test
        run: |
          docker run --rm \
            -e CI_ARTIFACT_DIR=/workspace/CI-results/propagation \
            -v "$PWD:/workspace" \
            -w /workspace \
            photospider-ci:local \
            bash ci/scripts/propagation_script_test.sh
      - name: Upload propagation logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: propagation-results
          path: CI-results/propagation
          if-no-files-found: warn

  plugin-load:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
      - name: Build local CI image
        run: docker build -t photospider-ci:local -f Dockerfile.ci .
      - name: Run plugin load test
        run: |
          docker run --rm \
            -e CI_ARTIFACT_DIR=/workspace/CI-results/plugin-load \
            -v "$PWD:/workspace" \
            -w /workspace \
            photospider-ci:local \
            bash ci/scripts/plugin_load_test.sh
      - name: Upload plugin logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: plugin-load-results
          path: CI-results/plugin-load
          if-no-files-found: warn

  scheduler-repeat:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive
      - name: Build local CI image
        run: docker build -t photospider-ci:local -f Dockerfile.ci .
      - name: Run scheduler repeat test
        run: |
          docker run --rm \
            -e CI_ARTIFACT_DIR=/workspace/CI-results/scheduler-repeat \
            -e SCHEDULER_REPEAT=5 \
            -e GPU_PIPELINE_REPEAT=3 \
            -v "$PWD:/workspace" \
            -w /workspace \
            photospider-ci:local \
            bash ci/scripts/scheduler_repeat_test.sh
      - name: Upload scheduler repeat logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scheduler-repeat-results
          path: CI-results/scheduler-repeat
          if-no-files-found: warn
